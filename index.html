<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERZİNCANIN KALEMLERİ</title>
    <style>
        body { 
            background-color: #F5F5DC; 
            /* Arka plan desenini kalem, kitap, silgi ve mürekkep ile güncelledim */
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='30' font-size='14' opacity='0.08'%3E🖋️%3C/text%3E%3Ctext x='60' y='25' font-size='14' opacity='0.08'%3E📖%3C/text%3E%3Ctext x='35' y='65' font-size='14' opacity='0.08'%3E🧼%3C/text%3E%3Ctext x='75' y='75' font-size='14' opacity='0.08'%3E✒️%3C/text%3E%3Ctext x='15' y='85' font-size='14' opacity='0.08'%3E📝%3C/text%3E%3C/svg%3E");
            background-attachment: fixed;
            color: #000033; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            text-align: center; 
            margin: 0; 
            overflow-x: hidden;
            user-select: none;
        }

        header { 
            background: #000033; 
            color: white; 
            padding: 15px; 
            display: none; 
            position: fixed; 
            width: 100%; 
            top: 0; 
            z-index: 100; 
        }

        #giris-ekrani { 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }

        .baslik-buton { cursor: pointer; display: inline-block; }

        .menu-izgara { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }
        .menu-kart { 
            background: #000033; color: white; padding: 18px; border-radius: 12px; 
            border: none; cursor: pointer; font-weight: bold; font-size: 1rem;
        }

        .bolum { padding: 80px 15px 40px 15px; display: none; min-height: 100vh; }
        .aktif { display: block !important; }
        
        .galeri { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 25px; 
            padding-bottom: 50px;
        }

        .kart { 
            background: white; 
            padding: 15px; 
            border-radius: 15px; 
            width: 90%; 
            max-width: 500px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .kart img { width: 100%; height: auto; border-radius: 10px; display: block; cursor: pointer; }

        /* LIGHTBOX */
        #lightbox {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); 
            z-index: 3000; 
            justify-content: center; 
            align-items: center;
        }

        #lightbox-icerik { max-width: 100%; max-height: 90%; }

        #kapat-x {
            position: absolute; top: 20px; right: 20px; color: white;
            font-size: 40px; font-weight: bold; cursor: pointer; z-index: 3001;
            background: rgba(255,255,255,0.2); width: 50px; height: 50px;
            line-height: 45px; text-align: center; border-radius: 50%;
        }

        /* ADMIN VE FORM STİLLERİ */
        .admin-box {
            display: none; background: #fff; padding: 15px; border-radius: 15px;
            margin-bottom: 25px; border: 2px dashed #000033; width: 90%; max-width: 500px; margin-left: auto; margin-right: auto;
        }

        textarea, input {
            width: 100%; padding: 12px; border: 1px solid #ddd;
            border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px;
        }

        .btn-main {
            background: #000033; color: white; border: none; padding: 15px;
            width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer;
        }

        .btn-cikis {
            background: #cc0000; color: white; border: none; padding: 8px;
            width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px;
        }

        .sil-btn {
            display: none; position: absolute; top: 10px; right: 10px; 
            background: #ff4d4d; color: white; border: none; width: 30px; 
            height: 30px; border-radius: 50%; font-size: 14px; z-index: 5;
        }
    </style>
</head>
<body>

<div id="lightbox" onclick="lightboxDisTiklama(event)">
    <span id="kapat-x" onclick="lightboxKapat()">&times;</span>
    <img id="lightbox-icerik" src="" onclick="event.stopPropagation()">
</div>

<div id="giris-ekrani">
    <h1 class="baslik-buton" onclick="tiklamaYonetimi()">🖋️ ERZİNCANIN KALEMLERİ</h1>
    <div class="menu-izgara">
        <button class="menu-kart" onclick="bolumAc('yazarlar-bolumu')">👤 YAZARLAR</button>
        <button class="menu-kart" onclick="bolumAc('eserler-bolumu')">📚 ESERLER</button>
        <button class="menu-kart" onclick="bolumAc('yazilar-bolumu')">🖋️ YAZILAR</button>
        <button class="menu-kart" onclick="bolumAc('yakinda-bolumu')">✨ YAKINDA</button>
    </div>
</div>

<header id="ana-header">
    <div class="baslik-buton" onclick="tiklamaYonetimi()" style="font-weight:bold; width: 100%;">🖋️ ERZİNCANIN KALEMLERİ</div>
</header>

<div id="yazarlar-bolumu" class="bolum">
    <h2>👤 YAZARLARIMIZ</h2>
    <div id="yazarlar-galeri" class="galeri"></div>
</div>

<div id="eserler-bolumu" class="bolum">
    <h2>📚 ESERLERİMİZ</h2>
    <div id="eserler-galeri" class="galeri"></div>
</div>

<div id="yazilar-bolumu" class="bolum">
    <h2>🖋️ YAZILAR</h2>
    <div id="yazi-admin" class="admin-box">
        <h3 style="margin-top:0">✍️ Yeni Yazı</h3>
        <textarea id="yazi-input" placeholder="Yazınızı buraya yazın..."></textarea>
        <button class="btn-main" onclick="kaydet('yazi')">Yayınla</button>
        <button class="btn-cikis" onclick="adminCikis()">❌ Oturumu Kapat</button>
    </div>
    <div id="yazi-liste" class="galeri"></div>
</div>

<div id="yakinda-bolumu" class="bolum">
    <h2>✨ YAKINDA GELECEK</h2>
    <div id="yakinda-admin" class="admin-box">
        <h3 style="margin-top:0">🚀 Yeni Duyuru</h3>
        <textarea id="yakinda-metin" placeholder="Duyuru metni..."></textarea>
        <input type="text" id="yakinda-img" placeholder="Görsel linki (Opsiyonel)">
        <button class="btn-main" onclick="kaydet('yakinda')">Ekle</button>
        <button class="btn-cikis" onclick="adminCikis()">❌ Oturumu Kapat</button>
    </div>
    <div id="yakinda-liste" class="galeri"></div>
</div>

<script>
    const base = "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_";
    const yazarNolar = [1, 6, 16, 18, 22, 25, 29];
    const eserNolar = [2, 3, 4, 5, 7, 8, 9, 10, 11, 12, 13, 14, 15, 17, 19, 20, 21, 23, 24, 26, 27, 28, 30];
    
    let isAdmin = false;
    let clickTimer = null;

    function tiklamaYonetimi() {
        if (clickTimer == null) {
            clickTimer = setTimeout(() => { clickTimer = null; anaMenuyeDon(); }, 300);
        } else {
            clearTimeout(clickTimer);
            clickTimer = null;
            const sifre = prompt("Admin Şifresi:");
            if(sifre === "1234") {
                isAdmin = true;
                document.querySelectorAll('.admin-box').forEach(b => b.style.display = 'block');
                yenile();
                alert("Yönetici girişi başarılı!");
            }
        }
    }

    function adminCikis() {
        if(confirm("Yönetici modundan çıkmak istediğine emin misin?")) {
            isAdmin = false;
            document.querySelectorAll('.admin-box').forEach(b => b.style.display = 'none');
            yenile();
            alert("Oturum kapatıldı.");
        }
    }

    function bolumAc(id) {
        document.getElementById('giris-ekrani').style.display = 'none';
        document.getElementById('ana-header').style.display = 'block';
        document.querySelectorAll('.bolum').forEach(b => b.classList.remove('aktif'));
        document.getElementById(id).classList.add('aktif');
        window.scrollTo(0,0);
    }

    function anaMenuyeDon() {
        document.getElementById('giris-ekrani').style.display = 'flex';
        document.getElementById('ana-header').style.display = 'none';
        document.querySelectorAll('.bolum').forEach(b => b.classList.remove('aktif'));
    }

    function kaydet(tip) {
        let veriler = JSON.parse(localStorage.getItem('erzincan_' + tip)) || [];
        let yeni = { id: Date.now(), tarih: new Date().toLocaleString('tr-TR') };

        if(tip === 'yazi') {
            yeni.icerik = document.getElementById('yazi-input').value;
            if(!yeni.icerik) return;
            document.getElementById('yazi-input').value = "";
        } else {
            yeni.icerik = document.getElementById('yakinda-metin').value;
            yeni.gorsel = document.getElementById('yakinda-img').value;
            if(!yeni.icerik) return;
            document.getElementById('yakinda-metin').value = "";
            document.getElementById('yakinda-img').value = "";
        }

        veriler.unshift(yeni);
        localStorage.setItem('erzincan_' + tip, JSON.stringify(veriler));
        yenile();
    }

    function sil(tip, id) {
        if(confirm("Bu içeriği kalıcı olarak silmek istiyor musun?")) {
            let veriler = JSON.parse(localStorage.getItem('erzincan_' + tip));
            veriler = veriler.filter(v => v.id !== id);
            localStorage.setItem('erzincan_' + tip, JSON.stringify(veriler));
            yenile();
        }
    }

    function yenile() {
        ['yazi', 'yakinda'].forEach(tip => {
            const liste = document.getElementById(tip + '-liste');
            const veriler = JSON.parse(localStorage.getItem('erzincan_' + tip)) || [];
            liste.innerHTML = veriler.map(v => `
                <div class="kart" style="position:relative; text-align:left;">
                    <button class="sil-btn" style="display:${isAdmin?'block':'none'}" onclick="sil('${tip}', ${v.id})">🗑️</button>
                    <small style="color:#888; font-weight:bold;">${v.tarih}</small>
                    <p style="margin:10px 0; line-height:1.6; color:#000033;">${v.icerik.replace(/\n/g, '<br>')}</p>
                    ${v.gorsel ? `<img src="${v.gorsel}" onclick="gorselBuyut(this.src)">` : ''}
                </div>
            `).join('');
        });
    }

    function gorselBuyut(src) {
        document.getElementById('lightbox-icerik').src = src;
        document.getElementById('lightbox').style.display = 'flex';
    }

    function lightboxKapat() { document.getElementById('lightbox').style.display = 'none'; }
    function lightboxDisTiklama(e) { if (e.target.id === 'lightbox') lightboxKapat(); }

    function galeriKur(idler, divId) {
        const div = document.getElementById(divId);
        if(!div) return;
        div.innerHTML = idler.map(n => `
            <div class="kart">
                <img src="./img/${base}${n}.png" onclick="gorselBuyut(this.src)" onerror="this.parentElement.style.display='none'">
            </div>
        `).join('');
    }

    window.onload = () => {
        galeriKur(yazarNolar, 'yazarlar-galeri');
        galeriKur(eserNolar, 'eserler-galeri');
        yenile();
    };
</script>

</body>
</html>
