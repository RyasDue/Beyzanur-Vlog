<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEYZANUR VLOG | Erzincan'ın Kalemleri</title>
    <style>
        /* Tam istediğin Bej & Lacivert Teması */
        body { 
            background-color: #F5F5DC; /* Bej Arka Plan */
            color: #000033; /* Siyaha çalan Lacivert */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            line-height: 1.6;
        }
        h1 { 
            border-bottom: 3px solid #000033; 
            display: inline-block; 
            padding-bottom: 10px; 
            margin-bottom: 40px; 
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 2.5rem;
        }
        .galeri { 
            max-width: 900px; 
            margin: 0 auto; 
            display: flex; 
            flex-direction: column; 
            gap: 30px; 
        }
        .kart { 
            background: #FAFAF0; /* Kartlar biraz daha açık bej */
            padding: 15px; 
            border-radius: 20px; 
            border: 1px solid #DCDCDC; 
            box-shadow: 0 10px 25px rgba(0, 0, 51, 0.05);
            transition: all 0.3s ease;
        }
        .kart:hover { 
            transform: scale(1.01);
            border-color: #000033;
        }
        img { 
            width: 100%; 
            border-radius: 12px; 
            display: block;
            image-rendering: -webkit-optimize-contrast; /* Harfleri netleştirir */
        }
        .footer { 
            margin-top: 60px; 
            color: #5A6A80; 
            font-size: 14px; 
            font-weight: bold; 
            letter-spacing: 3px; 
            padding-top: 20px;
            border-top: 1px solid #DCDCDC;
        }
    </style>
</head>
