<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERZİNCANIN KALEMLERİ</title>
    <style>
        body { 
            background-color: #F5F5DC; 
            /* Arka plan deseni: Kalem, Kitap, Kağıt emojileri */
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23000033' fill-opacity='0.07'%3E%3Ctext x='10' y='25' font-size='14'%3E🖋️%3C/text%3E%3Ctext x='60' y='30' font-size='14'%3E📖%3C/text%3E%3Ctext x='35' y='60' font-size='12'%3E✏️%3C/text%3E%3Ctext x='80' y='70' font-size='14'%3E📜%3C/text%3E%3Ctext x='15' y='85' font-size='12'%3E🧼%3C/text%3E%3Ctext x='55' y='90' font-size='12'%3E✒️%3C/text%3E%3C/g%3E%3C/svg%3E");
            background-attachment: fixed;
            color: #000033; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; user-select: none;
        }

        header { background: #000033; color: white; padding: 15px; display: none; position: fixed; width: 100%; top: 0; z-index: 100; }
        #giris-ekrani { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .menu-izgara { display: flex; flex-direction: column; gap: 10px; width: 280px; margin-top: 20px; }
        .menu-kart { background: #000033; color: white; padding: 15px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        
        .bolum { padding: 80px 15px 40px; display: none; min-height: 100vh; }
        .aktif { display: block !important; }
        
        .galeri { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .kart { 
            background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 500px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: left; border-left: 5px solid #000033;
        }
        .kart img { width: 100%; border-radius: 10px; margin-top: 10px; cursor: pointer; }
        
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        #lightbox img { max-width: 90%; max-height: 90%; }
    </style>
</head>
<body>

<div id="lightbox" onclick="this.style.display='none'"><img id="lb-img" src=""></div>

<div id="giris-ekrani">
    <h1 onclick="anaMenuyeDon()" style="cursor:pointer">🖋️ ERZİNCANIN KALEMLERİ</h1>
    <div class="menu-izgara">
        <button class="menu-kart" onclick="bolumAc('yazarlar-bolumu')">👤 YAZARLAR</button>
        <button class="menu-kart" onclick="bolumAc('eserler-bolumu')">📚 ESERLER</button>
        <button class="menu-kart" onclick="bolumAc('yazilar-bolumu')">🖋️ YAZILAR</button>
        <button class="menu-kart" onclick="bolumAc('yakinda-bolumu')">✨ YAKINDA</button>
    </div>
</div>

<header id="ana-header"><div onclick="anaMenuyeDon()" style="cursor:pointer; font-weight:bold;">🖋️ ERZİNCANIN KALEMLERİ</div></header>

<div id="yazarlar-bolumu" class="bolum"><h2>👤 YAZARLARIMIZ</h2><div id="yazarlar-galeri" class="galeri"></div></div>
<div id="eserler-bolumu" class="bolum"><h2>📚 ESERLERİMİZ</h2><div id="eserler-galeri" class="galeri"></div></div>

<div id="yazilar-bolumu" class="bolum">
    <h2>🖋️ YAZILAR</h2>
    <div id="yazi-liste" class="galeri"></div>
</div>

<div id="yakinda-bolumu" class="bolum">
    <h2>✨ YAKINDA</h2>
    <div id="yakinda-liste" class="galeri"></div>
</div>

<script>
    // --- BURASI YAZI EKLEME ALANI (HERKES GÖRÜR) ---
    const YAZILARIMIZ = [
        { tarih: "01.04.2026", metin: "Erzincan'ın kalemleri sitemize hoş geldiniz! Burada edebiyat konuşacağız.", resim: "" },
        { tarih: "02.04.2026", metin: "Yeni yazarlarımız yakında sisteme eklenecektir.", resim: "https://via.placeholder.com/500x300?text=Erzincan+Manzarası" }
    ];

    const YAKINDA_GELECEK = [
        { tarih: "Duyuru", metin: "Büyük çekiliş çok yakında!", resim: "" }
    ];

    // Galeri Ayarları
    const base = "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_";
    const yazarNolar = [1, 6, 16, 18, 22, 25, 29];
    const eserNolar = [2, 3, 4, 5, 7, 8, 9, 10, 11, 12, 13, 14, 15, 17, 19, 20, 21, 23, 24, 26, 27, 28, 30];

    function listele() {
        // Yazıları listele
        document.getElementById('yazi-liste').innerHTML = YAZILARIMIZ.map(y => `
            <div class="kart">
                <small style="color:#888"><b>${y.tarih}</b></small>
                <p style="margin:10px 0">${y.metin}</p>
                ${y.resim ? `<img src="${y.resim}" onclick="ac('${y.resim}')">` : ''}
            </div>
        `).join('');

        // Yakında gelecekleri listele
        document.getElementById('yakinda-liste').innerHTML = YAKINDA_GELECEK.map(y => `
            <div class="kart">
                <small style="color:#888"><b>${y.tarih}</b></small>
                <p style="margin:10px 0">${y.metin}</p>
                ${y.resim ? `<img src="${y.resim}" onclick="ac('${y.resim}')">` : ''}
            </div>
        `).join('');
    }

    function bolumAc(id) {
        document.getElementById('giris-ekrani').style.display = 'none';
        document.getElementById('ana-header').style.display = 'block';
        document.querySelectorAll('.bolum').forEach(b => b.classList.remove('aktif'));
        document.getElementById(id).classList.add('aktif');
        window.scrollTo(0,0);
    }

    function anaMenuyeDon() {
        document.getElementById('giris-ekrani').style.display = 'flex';
        document.getElementById('ana-header').style.display = 'none';
        document.querySelectorAll('.bolum').forEach(b => b.classList.remove('aktif'));
    }

    function ac(src) { document.getElementById('lb-img').src = src; document.getElementById('lightbox').style.display = 'flex'; }

    function galeriKur(idler, divId) {
        document.getElementById(divId).innerHTML = idler.map(n => `
            <div class="kart"><img src="./img/${base}${n}.png" onclick="ac(this.src)" onerror="this.parentElement.style.display='none'"></div>
        `).join('');
    }

    window.onload = () => {
        galeriKur(yazarNolar, 'yazarlar-galeri');
        galeriKur(eserNolar, 'eserler-galeri');
        listele();
    };
</script>
</body>
</html>
