<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEYZANUR VLOG</title>
    <style>
        /* Bej Tema Ayarları */
        body { 
            background-color: #F5F5DC; 
            color: #000033; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding-top: 100px; /* Menü için üstten boşluk */
            scroll-behavior: smooth; /* Yumuşak kaydırma */
        }

        /* Sabit Üst Menü */
        .ust-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #000033;
            padding: 15px 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .ust-menu a {
            color: #F5F5DC;
            text-decoration: none;
            font-weight: bold;
            margin: 0 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.1rem;
            transition: 0.3s;
        }
        .ust-menu a:hover {
            color: #FFD700; /* Altın sarısı hover efekti */
        }

        h1 { 
            border-bottom: 3px solid #000033; 
            display: inline-block; 
            padding-bottom: 10px; 
            margin-bottom: 30px; 
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .bolum-baslik {
            background-color: #000033;
            color: #F5F5DC;
            padding: 12px 30px;
            border-radius: 50px;
            display: inline-block;
            font-size: 1.4rem;
            margin: 60px 0 30px 0;
            text-transform: uppercase;
        }

        .galeri { 
            max-width: 800px; 
            margin: 0 auto; 
            display: flex; 
            flex-direction: column; 
            gap: 40px; 
            padding: 20px;
        }

        .kart { 
            background: #FAFAF0; 
            padding: 15px; 
            border-radius: 20px; 
            border: 1px solid #DCDCDC; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        img { 
            width: 100%; 
            border-radius: 12px; 
            display: block;
            height: auto;
        }

        hr { border: 0; border-top: 1px solid #DCDCDC; max-width: 800px; margin: 40px auto; }
    </style>
</head>
<body>

    <nav class="ust-menu">
        <a href="#kisiler">👤 KİŞİLER</a>
        <a href="#kitaplar">📚 KİTAPLAR</a>
    </nav>

    <h1>BEYZANUR VLOG</h1>

    <div id="kisiler">
        <div class="bolum-baslik">👥 YAZARLARIMIZ</div>
        <div class="galeri" id="kisiler-galeri"></div>
    </div>

    <hr>

    <div id="kitaplar">
        <div class="bolum-baslik">📚 ESERLER</div>
        <div class="galeri" id="kitaplar-galeri"></div>
    </div>

    <script>
        // ANALİZ EDİLEN KİŞİLER LİSTESİ
        const kisilerListesi = [
            "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_1",  // Öznur Yapıcı
            "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_6",  // Fatma Şahin
            "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_11", // Meral Orhan
            "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_16", // Nevin Işık
            "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_21", // Yeni Gelen Yazar
            "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_26"  // Yeni Gelen Yazar
        ];

        // ANALİZ EDİLEN KİTAPLAR LİSTESİ (Kalan 24 Resim)
        const kitaplarListesi = [
            "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_2", "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_3",
            "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_4", "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_5",
            "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_7", "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_8",
            "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_9", "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_10",
            "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_12", "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_13",
            "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_14", "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_15",
            "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_17", "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_18",
            "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_19", "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_20",
            "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_23", "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_24",
            "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_25", "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_27",
            "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_28", "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_29",
            "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_30"
        ];

        function yukle(liste, id) {
            const dom = document.getElementById(id);
            liste.forEach(f => {
                const k = document.createElement('div');
                k.className = 'kart';
                k.innerHTML = `<img src="./img/${f}.png" onerror="this.parentElement.style.display='none'">`;
                dom.appendChild(k);
            });
        }

        yukle(kisilerListesi, 'kisiler-galeri');
        yukle(kitaplarListesi, 'kitaplar-galeri');
    </script>
</body>
</html>
