<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERZİNCANIN KALEMLERİ</title>
    <style>
        body { background-color: #F5F5DC; color: #000033; font-family: sans-serif; text-align: center; margin: 0; }
        header { background: #000033; color: white; padding: 15px; display: none; position: fixed; width: 100%; top: 0; z-index: 100; }
        #giris-ekrani { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .menu-kart { background: #000033; color: white; padding: 20px; margin: 10px; border: none; border-radius: 8px; cursor: pointer; width: 200px; font-weight: bold; }
        
        .bolum { padding-top: 100px; display: none; }
        .aktif { display: block !important; }
        
        .galeri { display: flex; flex-direction: column; align-items: center; gap: 20px; padding-bottom: 50px; }
        .kart { background: white; padding: 10px; border: 1px solid #ddd; border-radius: 10px; width: 85%; max-width: 450px; cursor: pointer; transition: 0.3s; }
        .kart:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .kart img { width: 100%; height: auto; border-radius: 5px; display: block; }

        /* --- GÖRSEL BÜYÜTME (LIGHTBOX) STİLLERİ --- */
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 51, 0.9); /* Lacivert şeffaf arka plan */
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        #lightbox-icerik {
            max-width: 90%;
            max-height: 80%;
            border-radius: 10px;
            box-shadow: 0 0 25px rgba(255,255,255,0.2);
        }
        #kapat-butonu {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>

<div id="lightbox">
    <span id="kapat-butonu" onclick="lightboxKapat()">&times;</span>
    <img id="lightbox-icerik" src="" alt="Büyütülmüş Görsel">
</div>

<div id="giris-ekrani">
    <h1>ERZİNCANIN KALEMLERİ</h1>
    <div class="menu-izgara">
        <button class="menu-kart" onclick="bolumAc('yazarlar-bolumu')">👤 YAZARLAR</button>
        <button class="menu-kart" onclick="bolumAc('eserler-bolumu')">📚 ESERLER</button>
        <button class="menu-kart" onclick="bolumAc('yazilar-bolumu')">🖋️ YAZILAR</button>
        <button class="menu-kart" onclick="bolumAc('yakinda-bolumu')">✨ YAKINDA</button>
    </div>
</div>

<header id="ana-header">
    <div onclick="anaMenuyeDon()" style="cursor:pointer; font-weight:bold;">🏠 ERZİNCANIN KALEMLERİ</div>
</header>

<div id="yazarlar-bolumu" class="bolum">
    <h2>YAZARLARIMIZ</h2>
    <div id="yazarlar-galeri" class="galeri"></div>
</div>

<div id="eserler-bolumu" class="bolum">
    <h2>ESERLERİMİZ</h2>
    <div id="eserler-galeri" class="galeri"></div>
</div>

<div id="yazilar-bolumu" class="bolum">
    <h2>YAZILAR</h2>
    <div class="galeri"><div class="kart">Henüz bir yazı eklenmedi.</div></div>
</div>

<div id="yakinda-bolumu" class="bolum">
    <h2>YAKINDA</h2>
    <div class="galeri"><div class="kart">Yeni projeler üzerinde çalışıyoruz!</div></div>
</div>

<script>
    const base = "1774539616720-ab570c70-dd49-4001-92c9-e7ad6553f8e4_";
    const yazarNolar = [1, 6, 16, 18, 22, 25, 29];
    const eserNolar = [2, 3, 4, 5, 7, 8, 9, 10, 11, 12, 13, 14, 15, 17, 19, 20, 21, 23, 24, 26, 27, 28, 30];

    // Bölüm değiştirme fonksiyonu
    function bolumAc(id) {
        document.getElementById('giris-ekrani').style.display = 'none';
        document.getElementById('ana-header').style.display = 'block';
        document.querySelectorAll('.bolum').forEach(b => b.classList.remove('aktif'));
        document.getElementById(id).classList.add('aktif');
        window.scrollTo(0, 0);
    }

    // Ana menüye dönüş
    function anaMenuyeDon() {
        document.getElementById('giris-ekrani').style.display = 'flex';
        document.getElementById('ana-header').style.display = 'none';
        document.querySelectorAll('.bolum').forEach(b => b.classList.remove('aktif'));
    }

    // GÖRSEL BÜYÜTME FONKSİYONLARI
    function gorselBuyut(src) {
        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightbox-icerik');
        lbImg.src = src;
        lb.style.display = 'flex';
    }

    function lightboxKapat() {
        document.getElementById('lightbox').style.display = 'none';
    }

    // Galeri oluşturma fonksiyonu
    function galeriKur(idListesi, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = "";

        idListesi.forEach((n) => {
            const imgSrc = `./img/${base}${n}.png`;
            const kart = document.createElement('div');
            kart.className = 'kart';
            // Tıklayınca gorselBuyut fonksiyonunu çağırır
            kart.onclick = function() { gorselBuyut(imgSrc); };
            
            kart.innerHTML = `<img src="${imgSrc}" onerror="this.parentElement.style.display='none'">`;
            container.appendChild(kart);
        });
    }

    window.onload = function() {
        galeriKur(yazarNolar, 'yazarlar-galeri');
        galeriKur(eserNolar, 'eserler-galeri');
    };
</script>

</body>
</html>
